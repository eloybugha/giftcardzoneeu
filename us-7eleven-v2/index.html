<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>7-Eleven Rewards & Gift Card Offers in the US | GiftCardZoneEU</title>
<meta name="description" content="Access special offers and promotional opportunities through GiftCardZoneEU." />
<meta name="robots" content="noindex, nofollow">
<meta name="referrer" content="strict-origin-when-cross-origin">

<style>
:root{ --txt:#f8fafc; --muted:#cbd5e1; --acc1:#22c55e; --acc2:#16a34a; }
*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  color:var(--txt);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    linear-gradient(rgba(11,18,32,.85), rgba(11,18,32,.95)),
    url('/assets/hero/gift-bg.webp') center/cover no-repeat;
}

/* 🔥 LOGO */
.logo{
  position:fixed;
  top:16px;
  left:16px;
  z-index:10;
}
.logo img{
  height:42px;
  width:auto;
}

/* CARD */
main{
  width:min(720px,92vw);
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  border-radius:20px;
  padding:30px 24px;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
  text-align:center;
  backdrop-filter: blur(10px);
}

h1{margin:0 0 8px;font-size:clamp(26px,4.5vw,40px)}
p.sub{margin:0 0 18px;color:var(--muted)}

.bar{
  height:10px;
  background:rgba(255,255,255,.12);
  border-radius:999px;
  overflow:hidden;
  margin:10px 0 16px
}
#fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--acc1),var(--acc2));
  transition:width .2s linear
}

a.cta{
  display:inline-block;
  background:var(--acc1);
  color:#fff;
  text-decoration:none;
  padding:14px 26px;
  border-radius:12px;
  font-weight:700;
  font-size:18px;
  box-shadow:0 8px 24px rgba(34,197,94,.35);
  transition:.25s;
}
a.cta:hover{
  transform:translateY(-1px);
  background:var(--acc2)
}

.pulse{
  animation:pulse 1.6s ease-out infinite
}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(34,197,94,.55)}
  70%{box-shadow:0 0 0 14px rgba(34,197,94,0)}
  100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}
}

.badge{
  display:inline-block;
  margin:8px 0 12px;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(34,197,94,.15);
  border:1px solid rgba(34,197,94,.35);
  font-weight:600
}

.stock{
  margin-top:14px;
  color:#facc15;
  font-weight:600;
  font-size:15px
}

.small{
  opacity:.7;
  font-size:12px;
  margin-top:10px
}
</style>
</head>

<body>

<!-- 🔥 LOGO -->
<a href="https://giftcardzoneeu.com/" class="logo">
  <img src="/assets/gz-logo.png" alt="GiftCardZoneEU">
</a>

<main>
  <div class="badge">Special Access</div>

  <h1>🎁 Access Today’s Special Offer</h1>
  <p class="sub">Redirecting in <span id="secs">5</span>s...</p>

  <div class="bar"><div id="fill"></div></div>

  <!-- 🔥 PALITAN MO LINK -->
  <a id="cta" class="cta"
     href="YOUR_ADSTERRA_LINK_HERE"
     target="_blank"
     rel="nofollow noopener noreferrer">
     👉 Continue to Offer
  </a>

  <div class="stock">Offer availability may vary by advertiser and region.</div>
  <div class="small">You may be redirected to a third-party promotional page.</div>
</main>

<script>
const PRIMARY  = "https://walkeralacrityfavorite.com/r213cbb9mr?key=260fe979627d3329490b55e190d439de";
const FALLBACK = PRIMARY;

const cta  = document.getElementById("cta");
const fill = document.getElementById("fill");
const secs = document.getElementById("secs");

let total = 5, t = total;

function tick(){
  t = Math.max(0, t - 0.1);
  fill.style.width = ((total - t) / total * 100).toFixed(1) + "%";
  secs.textContent = Math.ceil(t);

  if (t <= 0){
    clearInterval(timer);
    cta.classList.add("pulse");
  }
}

const timer = setInterval(tick, 100);
tick();

cta.addEventListener("click", function(e){
  e.preventDefault();
  const win = window.open(PRIMARY, "_blank", "noopener,noreferrer");
  if (!win) {
    window.location.href = FALLBACK;
  }
});
</script>

</body>
</html>
